<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohanad Al-Harbi | CV</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #1a1a2e;
            --bar: #16213e;
            --accent: #3B82F6;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --shadow: rgba(0,0,0,0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top bar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--bar);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 2px 20px var(--shadow);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
        }

        .topbar-sep {
            width: 1px;
            height: 18px;
            background: rgba(255,255,255,0.15);
        }

        .page-info {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            padding: 9px 20px;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s;
        }
        .btn-download:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(59,130,246,0.35);
        }
        .btn-download svg { width: 15px; height: 15px; }

        /* CV display */
        .cv-container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 32px 16px 60px;
            overflow-y: auto;
        }

        .cv-image {
            max-width: 820px;
            width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 4px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
        }

        @media (max-width: 600px) {
            .topbar { padding: 10px 16px; }
            .topbar-name { font-size: 0.85rem; }
            .btn-download { padding: 8px 14px; font-size: 0.78rem; }
            .btn-download span { display: none; }
            .cv-container { padding: 16px 8px 40px; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <span class="topbar-name">Mohanad Al-Harbi</span>
        <div class="topbar-sep"></div>
        <span class="page-info">Curriculum Vitae</span>
    </div>
    <a class="btn-download" href="./CV.pdf">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Download CV</span>
    </a>
</div>

<div class="cv-container">
    <img class="cv-image" src="./cv_page.png" alt="Mohanad Al-Harbi CV">
</div>

</body>
</html>
