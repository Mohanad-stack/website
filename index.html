<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohanad Al-Harbi | CV</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #1a1a2e;
            --bar: #16213e;
            --accent: #3B82F6;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --shadow: rgba(0,0,0,0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top bar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--bar);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 2px 20px var(--shadow);
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
        }

        .topbar-sep {
            width: 1px;
            height: 18px;
            background: rgba(255,255,255,0.15);
        }

        .page-info {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            padding: 9px 20px;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s;
        }
        .btn-download:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(59,130,246,0.35);
        }
        .btn-download svg { width: 15px; height: 15px; }

        /* PDF viewer */
        .pdf-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: var(--bg);
        }

        /* Mobile fallback */
        .mobile-fallback {
            display: none;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 40px 24px;
            text-align: center;
        }
        .mobile-fallback p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
        }
        .mobile-fallback .btn-download {
            padding: 14px 32px;
            font-size: 0.95rem;
        }

        @media (max-width: 600px) {
            .topbar { padding: 10px 16px; }
            .topbar-name { font-size: 0.85rem; }
            .topbar .btn-download { padding: 8px 14px; font-size: 0.78rem; }
            .topbar .btn-download span { display: none; }

            /* On mobile, iframe PDF viewers are unreliable — show download prompt */
            .pdf-frame { display: none; }
            .mobile-fallback { display: flex; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <span class="topbar-name">Mohanad Al-Harbi</span>
        <div class="topbar-sep"></div>
        <span class="page-info">Curriculum Vitae</span>
    </div>
    <a class="btn-download" href="./CV.pdf" download="Mohanad_AlHarbi_CV.pdf">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Download CV</span>
    </a>
</div>

<!-- Desktop: embed PDF directly via iframe -->
<iframe class="pdf-frame" src="./CV.pdf" title="CV"></iframe>

<!-- Mobile: show a friendly download prompt instead -->
<div class="mobile-fallback">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
    </svg>
    <p>Tap the button below to view or download my CV.</p>
    <a class="btn-download" href="./CV.pdf" download="Mohanad_AlHarbi_CV.pdf">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download CV
    </a>
</div>

</body>
</html>
