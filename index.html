<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohanad Al-Harbi | CV</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #1a1a2e;
            --bar: #16213e;
            --accent: #3B82F6;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --shadow: rgba(0,0,0,0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top bar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--bar);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            box-shadow: 0 2px 20px var(--shadow);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
        }

        .topbar-sep {
            width: 1px;
            height: 18px;
            background: rgba(255,255,255,0.15);
        }

        .page-info {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            padding: 9px 20px;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s;
        }
        .btn-download:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(59,130,246,0.35);
        }
        .btn-download svg { width: 15px; height: 15px; }

        /* PDF container */
        .pdf-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 16px 60px;
            gap: 24px;
            overflow-y: auto;
        }

        .pdf-container canvas {
            max-width: 100%;
            height: auto !important;
            border-radius: 4px;
            box-shadow: 0 4px 30px var(--shadow), 0 0 0 1px rgba(255,255,255,0.04);
        }

        /* Loading */
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 80px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(255,255,255,0.08);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error */
        .error-msg {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-muted);
        }
        .error-msg h2 {
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 8px;
        }
        .error-msg p { font-size: 0.85rem; line-height: 1.6; }

        @media (max-width: 600px) {
            .topbar { padding: 10px 16px; }
            .topbar-name { font-size: 0.85rem; }
            .btn-download { padding: 8px 14px; font-size: 0.78rem; }
            .btn-download span { display: none; }
            .pdf-container { padding: 20px 8px 40px; gap: 16px; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <span class="topbar-name">Mohanad Al-Harbi</span>
        <div class="topbar-sep"></div>
        <span class="page-info" id="pageInfo">Loading...</span>
    </div>
    <a class="btn-download" href="CV.pdf" download="Mohanad_AlHarbi_CV.pdf">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Download CV</span>
    </a>
</div>

<div class="pdf-container" id="pdfContainer">
    <div class="loader" id="loader">
        <div class="spinner"></div>
        Loading CV...
    </div>
</div>

<script type="module">
    const { getDocument, GlobalWorkerOptions } = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');

    GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

    const container = document.getElementById('pdfContainer');
    const loader = document.getElementById('loader');
    const pageInfo = document.getElementById('pageInfo');

    try {
        const pdf = await getDocument('CV.pdf').promise;
        const totalPages = pdf.numPages;

        loader.remove();
        pageInfo.textContent = totalPages === 1 ? '1 page' : totalPages + ' pages';

        for (let i = 1; i <= totalPages; i++) {
            const page = await pdf.getPage(i);

            const desiredWidth = Math.min(900, window.innerWidth - 40);
            const unscaledViewport = page.getViewport({ scale: 1 });
            const scale = desiredWidth / unscaledViewport.width;
            const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
            const viewport = page.getViewport({ scale: scale * pixelRatio });

            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width = (viewport.width / pixelRatio) + 'px';
            canvas.style.height = (viewport.height / pixelRatio) + 'px';

            container.appendChild(canvas);

            await page.render({
                canvasContext: canvas.getContext('2d'),
                viewport: viewport
            }).promise;
        }
    } catch (err) {
        loader.remove();
        pageInfo.textContent = 'Error';
        container.innerHTML =
            '<div class="error-msg">' +
            '<h2>Could not load CV</h2>' +
            '<p>Make sure <strong>CV.pdf</strong> is in the same folder as this page.<br>' +
            'You can still download it using the button above.</p>' +
            '</div>';
    }
</script>

</body>
</html>
